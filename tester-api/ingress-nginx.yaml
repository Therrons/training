apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docke-web-api
  namespace: tester-api
  annotations:
    # Mirror your nginx.conf settings:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # NGINX Ingress handles websocket upgrade automatically with Upgrade/Connection headers
spec:
  ingressClassName: nginx
  rules:
    - host: api.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docke-web-api
                port:
                  number: 8080
  # Optional TLS (if you have certs)
  # tls:
  #   - hosts:
  #       - api.localtest.me
  #     secretName: api-tls