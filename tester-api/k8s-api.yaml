---
apiVersion: v1
kind: Namespace
metadata:
  name: tester-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docke-web-api
  namespace: tester-api
  labels:
    app: docke-web-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docke-web-api
  template:
    metadata:
      labels:
        app: docke-web-api
    spec:
      containers:
        - name: api
          # Your image tag from the compose file
          image: docke_web_api:offline
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "LOC"
            # Optional: pass build metadata if you want them available in K8s
            # - name: BUILD_DATE
            #   value: "2026-03-07T11:00:00Z"
            # - name: BUILD_VERSION
            #   value: "1.0.0"
          ports:
            - containerPort: 8080
          # Probes (use Swagger UI path since you enable Swagger in all envs)
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: docke-web-api
  namespace: tester-api
spec:
  selector:
    app: docke-web-api
  ports:
    - name: http
      port: 8080        # Service port inside cluster
      targetPort: 8080  # Container port
      protocol: TCP
  type: ClusterIP