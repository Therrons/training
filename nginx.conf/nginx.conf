# /nginx.conf
# Minimal reverse proxy to ASP.NET Core API on 'api:8080'.
# This will make Swagger available at http://localhost/swagger
# Optional: uncomment the redirect line to land directly on /swagger.

# Note: Ensure this nginx.conf is used in the nginx container and that the API container is named 'api' in your Docker Compose setup.
# the internal port 8080 is used by the API container, and nginx listens on 8085 to avoid conflicts.
upstream api_upstream {
    server api:8080; 
    keepalive 32;
}

# this is what the host listenens on, and the server_name _; means it will respond to any hostname
server {
    listen 8085; # Expose on port 8085 to avoid conflicts with API container
    server_name _; # Respond to any hostname

    # Optional landing redirect:
    location = / { return 302 /swagger; }

    # Increase default buffer sizes for large Swagger JSON if needed
    client_max_body_size 50m;

    # Proxy all requests to API
    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;

        # Required headers so ASP.NET Core sees original host/scheme
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upgrade headers for websockets if any
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout   5s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
        send_timeout           60s;
    }
}

# Maps used to handle websocket upgrade cleanly
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}