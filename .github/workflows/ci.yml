name: CI - Docker + Helm Validation

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

env:
  IMAGE_NAME: docke_web_api
  IMAGE_TAG: ci
  CHART_PATH: charts/docke-web-api
  NAMESPACE: docke-web-api

jobs:
  ci-pr:
    if: github.event_name == 'pull_request'
    name: PR Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Example placeholders – keep or replace with your real steps
      - name: Build Docker image (CI validation)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Helm lint
        run: helm lint $CHART_PATH

  ci-main:
    if: github.event_name == 'push'
    name: Main Branch Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [ dev, staging, prod ]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (CI validation)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Helm lint (${{ matrix.env }})
        run: helm lint $CHART_PATH