name: Build and Push Docker Image

on:
  workflow_run:
    workflows:
      - CI - Docker + Helm Validation
    types:
      - completed

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.head_branch == 'Docker' ||
        github.event.workflow_run.head_branch == 'K8s'
      )

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout validated commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/docke_web_api:latest # image name and tag must be lower case